<!DOCTYPE html>
<html>
<head>
    <title>Table Layout</title>
</head>
<body>

<table border="1" width="100%" height="600">

    <tr height="15%">
        <td colspan="2" align="center" bgcolor="red">
            <font color="white" size="6">
                &lt;header&gt;
            </font>
        </td>
    </tr>

    <tr height="15%">
        <td colspan="2" align="center" bgcolor="deepskyblue">
            <font color="white" size="6">
                &lt;nav&gt;
            </font>
        </td>
    </tr>

    <tr height="50%">

        <td width="60%" valign="top">

            <table border="1" width="100%" height="100%">

                <tr height="50%">
                    <td align="center" bgcolor="#f0b44f">
                        <font color="white" size="6">
                            &lt;section&gt;
                        </font>
                    </td>
                </tr>

                <tr height="50%">
                    <td align="center" bgcolor="#f78b4b">
                        <font color="white" size="6">
                            &lt;article&gt;
                        </font>
                    </td>
                </tr>

            </table>

        </td>

        <td width="40%" align="center" bgcolor="#eb5bbd">
            <font color="white" size="6">
                &lt;aside&gt;
            </font>
        </td>

    </tr>

    <tr height="20%">
        <td colspan="2" align="center" bgcolor="gray">
            <font color="white" size="6">
                &lt;footer&gt;
            </font>
        </td>
    </tr>

</table>

</body>
</html>
