<!DOCTYPE html>
<html>
<head>
    <title>Student Layout</title>
</head>
<body>

<table border="1" width="900" height="550" align="center">

    <tr height="15%">
        <td rowspan="4" width="15%" align="center">
            <h2>Navigation</h2>
        </td>

        <td align="center">
            <h1>Header</h1>
        </td>
    </tr>

    <tr height="5%">
        <td>
            <table border="1" width="100%">
                <tr>
                    <td>Student Number: 92837293</td>
                    <td align="right">All Students</td>
                </tr>
            </table>
        </td>
    </tr>

    <tr height="45%">
        <td>
            <table border="1" width="100%" height="100%">
                <tr>
                    <td width="65%">[Main left box]</td>
                        
                    <td width="35%">
                        <table border="1" width="100%" height="100%">
                            <tr>
                                <td height="50%">[Top right Box]</td>
                            </tr>

                            <tr>
                                <td height="50%">[Bottom right Box]</td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

    <tr height="35%">
        <td></td>
    </tr>

</table>

</body>
</html>
