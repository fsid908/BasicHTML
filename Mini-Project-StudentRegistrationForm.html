<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ChiPi Technologies - Student Registration</title>
    <style>
        p{
            font-size: 20px;
        }
        label{
            font-size: 20px;
        }
        input{
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h2>ChiPi Technologies - Student Registration Form</h2>

    <form>

        <label for="fullName">Full Name:</label><br>
        <input type="text"
               id="fullName"
               name="fullName"
               placeholder="e.g., Ramesh Kumar"
               required>
        <br><br>

        <label for="email">Email Address:</label><br>
        <input type="email"
               id="email"
               name="email"
               placeholder="e.g., ramesh@example.com"
               required>
        <br><br>

        <label for="mobile">Mobile Number:</label><br>
        <input type="tel"
               pattern="\+91-[0-5]{10}"
               id="mobile"
               name="mobile"
               placeholder="+91-1234567890"
               required>
        <br><br>

        <label>Gender:</label><br>

        <input type="radio"
               id="male"
               name="gender"
               value="Male">
        <label for="male">Male</label><br>

        <input type="radio"
               id="female"
               name="gender"
               value="Female">
        <label for="female">Female</label><br>

        <input type="radio"
               id="other"
               name="gender"
               value="Other">
        <label for="other">Other</label>
        <br><br>

        <label for="course">Select Course:</label><br>

        <select id="course"
                name="course"
                required>

            <option value="">
                -- Please choose an option --
            </option>

            <option value="Java Full Stack">
                Java Full Stack
            </option>

            <option value="MERN Stack">
                MERN Stack
            </option>

            <option value="Python Full Stack">
                Python Full Stack
            </option>

        </select>

        <br><br>

        <label for="batch">
            Preferred Batch Timing:
        </label><br>

        <input type="text"
               id="batch"
               name="batch"
               placeholder="e.g., Weekend Morning / Evening">

        <br><br>

        <label for="comments">
            Any Comments or Questions:
        </label><br>

        <textarea id="comments"
                  name="comments"
                  rows="4"
                  cols="40"
                  placeholder="Write here..."></textarea>

        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear Form">

    </form>

    <p>&copy; 2026 Farhan Siddiqui, All rights reserved.</p>

</body>
</html>
