<!DOCTYPE html>
<html>
<head>
    <title>Website Layout Using Table</title>
</head>
<body>

<table border="1" width="700" height="500" align="center">

    <tr height="15%">
        <td colspan="3" align="center">
            <h2>Header</h2>
        </td>
    </tr>

    <tr height="65%">

        <td width="20%">

            <table border="1" width="100%" height="100%">
                <tr height="60%">
                    <td align="center">Menu</td>
                </tr>

                <tr height="40%">
                    <td align="center">Ad2</td>
                </tr>
            </table>

        </td>

        <td width="50%" align="center">
            <h2>Main</h2>
        </td>

        <td width="30%" align="center">
            <h2>Ad1</h2>
        </td>

    </tr>

    <tr height="20%">
        <td colspan="3" align="center">
            <h2>Footer</h2>
        </td>
    </tr>

</table>

</body>
</html>
