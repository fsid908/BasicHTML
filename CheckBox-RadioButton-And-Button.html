<html>
<head>
    <title>HTML Form Elements</title>
</head>

<body>

<form style="font-size: 24px;">

    <br>
    <br>

    <p><b>Select the course</b> you are interested in.</p>

    <p>Name attribute is used to create a group of radio buttons.</p>

    <p>
        The radio with the same name will be
        considered as members of the group.
    </p>

    <p>
        value attribute is used to set the value
        of the radio button.
    </p>

    <input type="radio" id="GUI" name="course" value="GUI">
    <label for="GUI"><b>Graphical User Interface</b></label>

    <br>

    <input type="radio" id="Backend" name="course" value="Backend">
    <label for="Backend"><b>Backend Programming</b></label>

    <br>

    <input type="radio" id="ML" name="course" value="ML">
    <label for="ML"><b>Machine Learning</b></label>

    <br>
    <br>
    <br>

    <input type="checkbox" id="CCourse">
    <label for="CCourse"><b>C Language</b></label>

    <br>

    <input type="checkbox" id="CPlusPlusCourse">
    <label for="CPlusPlusCourse"><b>C++ Language</b></label>

    <br>

    <input type="checkbox" id="JavaCourse">
    <label for="JavaCourse"><b>Java Language</b></label>

    <br>

    <input type="checkbox" id="PythonCourse">
    <label for="PythonCourse"><b>Python Language</b></label>

    <br>
    <br>
    <br>

    <input type="button" value="Proceed">
    <input type="button" value="Cancel">
    <input type="reset" value="Reset">
    <input type="submit" value="Submit">

</form>

</body>
</html>
